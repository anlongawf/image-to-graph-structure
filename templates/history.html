<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử Phân Tích - Image2Graph</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">G</div>
                <h1 class="text-xl font-bold text-gray-900">Image2Graph</h1>
            </a>
            <div class="flex items-center space-x-4">
                <span id="user-greeting" class="text-sm font-medium text-gray-700"></span>
                <button id="btn-logout" class="text-sm font-medium text-red-600 hover:text-red-700 transition-colors">Đăng Xuất</button>
            </div>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900">Lịch Sử Phân Tích</h2>
                <p class="mt-2 text-sm text-gray-600">Danh sách các đồ thị bạn đã xử lý trước đây.</p>
            </div>
            <a href="/" class="text-sm font-semibold text-blue-600 hover:text-blue-700 flex items-center transition-colors">Quay lại</a>
        </div>
        <div id="error-msg" class="hidden bg-red-50 text-red-600 p-4 rounded-lg mb-6 text-sm border border-red-100"></div>
        <div class="bg-white shadow-sm border border-gray-200 rounded-xl overflow-hidden">
            <ul id="history-list" class="divide-y divide-gray-200">
                <li class="p-12 text-center text-gray-500">Đang tải dữ liệu...</li>
            </ul>
        </div>
    </main>
    <script src="/static/js/history.js?v=20260314"></script>
</body>
</html>
